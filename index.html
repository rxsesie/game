<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cozy Forest Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui">
      <div class="top-row">
        <h1>🌲 Cozy Forest Explorer</h1>
        <div class="chips">
          <span id="time">🕰️ Morning</span>
          <span id="weather">☀️ clear</span>
          <span id="discovery">🧭 0%</span>
        </div>
      </div>
      <p>Move: WASD/Arrows · E Campfire · H Pet · T Bonsai · F Fish · R Breathe · J Journal</p>
      <div id="status"></div>
      <div class="customizer">
        <label>Skin
          <select id="skinSelect">
            <option value="warm">Warm</option>
            <option value="cool">Cool</option>
            <option value="deep">Deep</option>
          </select>
        </label>
        <label>Outfit
          <select id="outfitSelect">
            <option value="moss">Moss</option>
            <option value="berry">Berry</option>
            <option value="dusk">Dusk</option>
          </select>
        </label>
        <label>Pet
          <select id="petSelect">
            <option value="fox">Fox</option>
            <option value="cat">Cat</option>
            <option value="spirit">Spirit</option>
          </select>
        </label>
        <button id="applyStyle" type="button">Apply style</button>
      </div>
    </div>
    <script src="https://unpkg.com/kaboom/dist/kaboom.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
